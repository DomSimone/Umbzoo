<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Umbuzo</title>
    <meta name="description" content="Create your Umbuzo account - African AI Assistant">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="/static/images/Mbuzo.png" alt="Umbuzo" onerror="this.style.display='none'">
                <h1>Umbuzo</h1>
            </div>

            <h2 class="auth-title">Create your account</h2>
            <p class="auth-subtitle">Start exploring African knowledge with AI</p>

            <form id="signupForm" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="fullname">Full Name (optional)</label>
                    <input type="text" id="fullname" class="form-input" placeholder="Enter your full name" autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Choose a username" required autocomplete="username" autofocus>
                    <div class="form-error" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required autocomplete="email">
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password (min 6 characters)" required autocomplete="new-password">
                    <div class="form-error" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required autocomplete="new-password">
                    <div class="form-error" id="confirmError"></div>
                </div>

                <div class="form-error" id="generalError" style="margin-bottom: 16px;"></div>

                <button type="submit" class="btn-primary" id="signupBtn" onclick="handleSignup()">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function handleSignup() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const fullname = document.getElementById('fullname').value.trim();
            const btn = document.getElementById('signupBtn');
            const generalError = document.getElementById('generalError');

            document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));
            generalError.classList.remove('visible');

            let hasError = false;
            if (!username || username.length < 3) {
                document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
                document.getElementById('usernameError').classList.add('visible');
                hasError = true;
            }
            if (!email || !email.includes('@') || !email.includes('.')) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                document.getElementById('emailError').classList.add('visible');
                hasError = true;
            }
            if (!password || password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                document.getElementById('passwordError').classList.add('visible');
                hasError = true;
            }
            if (password !== confirmPassword) {
                document.getElementById('confirmError').textContent = 'Passwords do not match';
                document.getElementById('confirmError').classList.add('visible');
                hasError = true;
            }
            if (hasError) return;

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                await UmbuzoAPI.signup(username, email, password, fullname || null);
                window.location.href = '/';
            } catch (error) {
                generalError.textContent = error.message || 'Failed to create account';
                generalError.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('signupForm').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSignup();
                }
            });
        });
    </script>
</body>
</html>
